name: Pull Request

# Validation build for pull requests (any source/feature branch).
# Intentionally does NOT touch deployment status.
on:
  pull_request:

permissions:
  contents: read

# Cancel superseded runs when a PR is updated with new commits.
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
